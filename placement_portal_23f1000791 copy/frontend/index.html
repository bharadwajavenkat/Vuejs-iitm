<!DOCTYPE html>
<html>
<head>

<title>Placement Portal Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body class="bg-light">

<div id="app" class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">Placement Portal</h3>

<input v-model="email" placeholder="Email" class="form-control mb-3">

<input v-model="password" type="password" placeholder="Password" class="form-control mb-3">

<button class="btn btn-primary w-100" @click="login">Login</button>

<p class="text-danger mt-3 text-center">{{message}}</p>

</div>

</div>

</div>

</div>

</div>

<script>

const {createApp} = Vue

createApp({

data(){
return{
email:"",
password:"",
message:""
}
},

methods:{

login(){

axios.post("http://127.0.0.1:5000/login",{

email:this.email,
password:this.password

})

.then(res=>{

this.message=res.data.message

if(res.data.role === "admin"){
window.location="/admin"
}

if(res.data.role === "company"){
window.location="/company"
}

if(res.data.role === "student"){
window.location="/student"
}

})

.catch(()=>{
this.message="Invalid login credentials"
})

}

}

}).mount("#app")

</script>

</body>
</html>
