<!DOCTYPE html>
<html>
<head>

<title>Company Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app" class="container mt-5">

<h2>Company Dashboard</h2>

<h4 class="mt-4">Create Placement Drive</h4>

<input v-model="title" placeholder="Job Title" class="form-control mb-2">
<input v-model="description" placeholder="Description" class="form-control mb-2">
<input v-model="branch" placeholder="Branch" class="form-control mb-2">
<input v-model="cgpa_required" placeholder="CGPA Required" class="form-control mb-2">
<input v-model="deadline" placeholder="Deadline" class="form-control mb-2">

<button class="btn btn-primary" @click="createDrive">Create Drive</button>

<p class="mt-3">{{message}}</p>

</div>

<script>

const {createApp} = Vue

createApp({

data(){
return{

company_id:2,

title:"",
description:"",
branch:"",
cgpa_required:"",
deadline:"",
message:""

}
},

methods:{

createDrive(){

axios.post("http://127.0.0.1:5000/company/create_drive",{

company_id:this.company_id,
title:this.title,
description:this.description,
branch:this.branch,
cgpa_required:this.cgpa_required,
deadline:this.deadline

})
.then(res=>{

this.message=res.data.message

})

}

}

}).mount("#app")

</script>

</body>
</html>
