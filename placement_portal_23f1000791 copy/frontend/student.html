<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app" class="container mt-5">

<h2>Student Dashboard</h2>

<h4 class="mt-4">Available Placement Drives</h4>

<table class="table">

<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Branch</th>
<th>CGPA</th>
<th>Deadline</th>
<th>Action</th>
</tr>

<tr v-for="d in drives">

<td>{{d.id}}</td>
<td>{{d.title}}</td>
<td>{{d.description}}</td>
<td>{{d.branch}}</td>
<td>{{d.cgpa_required}}</td>
<td>{{d.deadline}}</td>

<td>
<button class="btn btn-success" @click="apply(d.id)">
Apply
</button>
</td>

</tr>

</table>

<h4 class="mt-5">My Applications</h4>

<table class="table">

<tr>
<th>Drive</th>
<th>Status</th>
<th>Date</th>
</tr>

<tr v-for="a in applications">

<td>{{a.drive_title}}</td>
<td>{{a.status}}</td>
<td>{{a.date}}</td>

</tr>

</table>

<button class="btn btn-primary mt-3" @click="exportCSV">
Export Applications CSV
</button>

<p class="mt-3">{{message}}</p>

</div>

<script>

const {createApp} = Vue

createApp({

data(){
return{

student_id:1,
drives:[],
applications:[],
message:""

}
},

methods:{

loadDrives(){

axios.get("http://127.0.0.1:5000/drives")
.then(res=>{
this.drives=res.data
})

},

apply(id){

axios.post("http://127.0.0.1:5000/apply",{

student_id:this.student_id,
drive_id:id

})
.then(res=>{

this.message=res.data.message
this.loadApplications()

})

},

loadApplications(){

axios.get("http://127.0.0.1:5000/student/applications/"+this.student_id)
.then(res=>{
this.applications=res.data
})

},

exportCSV(){

axios.get("http://127.0.0.1:5000/export_csv/"+this.student_id)
.then(res=>{
this.message=res.data.message
})

}

},

mounted(){

this.loadDrives()
this.loadApplications()

}

}).mount("#app")

</script>

</body>
</html>
